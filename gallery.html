<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gallery - Photography Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Poppins;
            background: #0f1724;
            color: #fff;
        }

        header,
        footer {
            background: #0b1220;
            padding: 15px 30px;
        }

        nav a {
            color: #ccc;
            margin-right: 15px;
            text-decoration: none;
        }

        nav a:hover {
            color: #fff;
        }

        .container {
            padding: 20px 30px;
        }

        h1 {
            margin-top: 0;
        }

        .section-title {
            margin-top: 30px;
            font-size: 22px;
            font-weight: 600;
        }

        /* GALLERY */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .gallery-grid img {
            width: 100%;
            border-radius: 10px;
            height: 200px;
            object-fit: cover;
            cursor: pointer;
            transition: 0.3s;
        }

        .gallery-grid img:hover {
            transform: scale(1.05);
        }

        /* POPUP OVERLAY */
        #popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        #popup img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        /* CLOSE BUTTON */
        .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 35px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <header>
        <nav>
            <a href="index.html">Home</a>
            <a href="gallery.html">Gallery</a>
            <a href="about.html">About</a>
            <a href="services.html">Services</a>
            <a href="contact.html">Contact</a>
            <a href="Login.html">login</a>
        </nav>
    </header>

    <div class="container">
        <h1>Event Photography Gallery</h1>

        <h2 class="section-title">Wedding Photography</h2>
        <div class="gallery-grid">
            <img src="Images/wedding1.jpg">
            <img src="Images/wedding2.jpg.jpg">
            <img src="Images/wedding4.jpg">


        </div>

        <h2 class="section-title">Birthday Events</h2>
        <div class="gallery-grid">
            <img src="Images/birthday1.jpg">
            <img src="Images/birthday2.jpg">
            <img src="Images/birthday-3.jpg">
        </div>

        <h2 class="section-title">Corporate Events</h2>
        <div class="gallery-grid">
            <img src=Images/corporate1.jpg>
            <img src=Images/corporate2.jpg>
            <img src=Images/corporate3.jpg>
        </div>

        <h2 class="section-title">College & Cultural Events</h2>
        <div class="gallery-grid">
            <img src="Images/culture1.jpg">
             <img src=Images/culture2.jpg>
            <img src="Images/culture3.jpg">
        </div>

        <h2 class="section-title">Engagement / Pre-wedding</h2>
        <div class="gallery-grid">
            <img src="Images/Engagement1.jpg">
            <img src="Images/Pre-weddingshoot.webp">
            <img src="Images/Engagement2.jpg">
        </div>

        <h2 class="section-title">Baby Shower & Naming Ceremony</h2>
        <div class="gallery-grid">
            <img src=Images/babyshower1.jpg>
            <img src=Images/namingceremony1.webp>
            <img src="Images/babyshower3.jpg">
        </div>
    </div>

    <footer>
        <p>© 2025 Mahalaxmi Karampuri Photography</p>
    </footer>

    <!-- POPUP -->
    <div id="popup">
        <span class="close-btn" onclick="closePopup()">×</span>
        <img id="popup-img" src="">
    </div>

    <script>
        // Open Popup
        document.querySelectorAll(".gallery-grid img").forEach(img => {
            img.addEventListener("click", () => {
                document.getElementById("popup-img").src = img.src;
                document.getElementById("popup").style.display = "flex";
            });
        });

        // Close Popup
        function closePopup() {
            document.getElementById("popup").style.display = "none";
        }
    </script>

</body>

</html>
