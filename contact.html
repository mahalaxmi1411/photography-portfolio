<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact - Photography Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: Poppins;
            background: #0f1724;
            color: #fff;
        }

        header,
        footer {
            background: #0b1220;
            padding: 15px 30px;
        }

        nav a {
            color: #ccc;
            margin-right: 15px;
            text-decoration: none;
        }

        nav a:hover {
            color: #fff;
        }

        .container {
            padding: 20px 30px;
            max-width: 700px;
            margin: auto;
        }

        h1 {
            margin-top: 0;
        }

        .card {
            background: #0b1220;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        label {
            display: block;
            margin-top: 10px;
            color: #ccc;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #333;
            background: transparent;
            color: #fff;
            margin-top: 5px;
        }

        button {
            margin-top: 15px;
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            background: #e2b94b;
            color: #000;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.85;
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <a href="index.html">Home</a>
            <a href="gallery.html">Gallery</a>
            <a href="about.html">About</a>
            <a href="services.html">Services</a>
            <a href="contact.html">Contact</a>
            <a href="login.html">login</a>
        </nav>
    </header>

    <div class="container">
        <h1>Contact Me</h1>
        <div class="card">
            <p>Feel free to contact me for bookings, collaborations, or inquiries.</p>

            <form action="mailto:lata@example.com" method="post" enctype="text/plain">
                <label>Your Name</label>
                <input type="text" name="name" placeholder="Enter your name" required>

                <label>Your Email</label>
                <input type="email" name="email" placeholder="Enter your email" required>

                <label>Your Message</label>
                <textarea name="message" rows="5" placeholder="Type your message here" required></textarea>

                <button type="submit">Send Message</button>
            </form>
        </div>
    </div>

    <footer>
        <p>© 2025 Mahalaxmi Karampuri Photography</p>
    </footer>
</body>

</html>
